services:
  db:
    image: pgvector/pgvector:pg17
    container_name: psql_db
    
    restart: unless-stopped

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cortexdb

    volumes:
      - cortexdb_data:/var/lib/postgresql/data

volumes:
  cortexdb_data:
